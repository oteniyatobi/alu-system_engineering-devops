<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500&display=swap');

  :root {
    --bg: #0A0A0A;
    --fg: #EDEDED;
    --muted: #6B7280;
    --accent: #4A5568;
    --line: #1F1F1F;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: 'Inter', system-ui, sans-serif;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }

  .wrap {
    max-width: 520px;
    width: 100%;
    text-align: center;
  }

  .code {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: clamp(64px, 18vw, 140px);
    line-height: 1;
    letter-spacing: -0.02em;
    color: var(--fg);
    position: relative;
    display: inline-block;
    user-select: none;
  }

  .code::after {
    content: '404';
    position: absolute;
    top: 0;
    left: 2px;
    color: var(--accent);
    clip-path: polygon(0 42%, 100% 38%, 100% 61%, 0 57%);
    animation: glitch 6s infinite steps(1);
  }

  @keyframes glitch {
    0%, 92%, 100% { transform: translate(0, 0); opacity: 0; }
    93% { transform: translate(-3px, 1px); opacity: 0.9; }
    95% { transform: translate(2px, -1px); opacity: 0.9; }
    97% { transform: translate(-1px, 0); opacity: 0.6; }
  }

  .divider {
    width: 40px;
    height: 1px;
    background: var(--line);
    margin: 28px auto;
  }

  .fr {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    color: var(--muted);
    letter-spacing: 0.02em;
    margin: 0 0 8px 0;
  }

  .en {
    font-size: 14px;
    color: var(--muted);
    margin: 0 0 32px 0;
  }

  a.home {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--fg);
    text-decoration: none;
    border: 1px solid var(--line);
    padding: 10px 20px;
    border-radius: 2px;
    display: inline-block;
    transition: border-color 0.15s ease, color 0.15s ease;
  }

  a.home:hover,
  a.home:focus-visible {
    border-color: var(--accent);
    color: var(--accent);
    outline: none;
  }

  a.home:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 3px;
  }

  @media (prefers-reduced-motion: reduce) {
    .code::after { animation: none; opacity: 0; }
  }
</style>
</head>
<body>
  <main class="wrap">
    <div class="code" aria-hidden="true">404</div>
    <div class="divider"></div>
    <p class="fr">Ceci n'est pas une page.</p>
    <p class="en">This page does not exist &mdash; the URL points nowhere.</p>
    <a class="home" href="/">Back to safety</a>
  </main>
</body>
</html>
